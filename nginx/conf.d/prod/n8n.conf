server {
    listen 443 ssl;
    server_name n8n.jordane-brosset.com;

    ssl_certificate /etc/letsencrypt/live/jordane-brosset.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jordane-brosset.com/privkey.pem;
    include /etc/nginx/ssl/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        resolver 127.0.0.11 valid=30s;
        set $n8n_upstream http://n8n-n8n-1:5678;
        proxy_pass $n8n_upstream;

        # 🔧 WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 🔧 Headers classiques
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
